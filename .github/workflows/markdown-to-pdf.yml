name: Convert Markdown to PDF

on:
  push:
    paths:
      - '**.md'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-latex-extra
      
      - name: Convert Markdown Files to PDF
        run: |
          for file in *.md; do
            if [ -f "$file" ]; then
              echo "Converting $file..."
              pandoc "$file" -o "${file%.md}.pdf" \
                --pdf-engine=xelatex \
                -V CJKmainfont="WenQuanYi Zen Hei" \
                -V geometry:margin=2cm
            fi
          done
      
      - name: Upload PDFs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.pdf
          git diff --cached --quiet || git commit -m "docs: auto-generate PDF files from Markdown [skip ci]"
          git push
