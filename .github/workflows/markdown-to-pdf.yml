name: Markdown to PDF Converter
on:
  push:
    paths:
      - '**.md'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install -g markdown-pdf
      
      - name: Convert all MD files to PDF
        run: |
          for file in *.md; do
            if [ -f "$file" ]; then
              echo "Converting $file to PDF..."
              markdown-pdf "$file" -o "${file%.md}.pdf"
            fi
          done
      
      - name: Commit and push PDF files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.pdf
          git diff --cached --quiet || git commit -m "Auto-generate PDF from Markdown files [skip ci]"
          git push
