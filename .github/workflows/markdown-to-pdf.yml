name: Convert Markdown to PDF with Mermaid

on:
  push:
    branches:
      - main
    paths:
      - 'Security.md'
  pull_request:
    branches:
      - main
    paths:
      - 'Security.md'
  workflow_dispatch:

jobs:
  convert-to-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser fonts-noto-cjk

      - name: Install mermaid-cli and md-to-pdf
        run: |
          npm install -g @mermaid-js/mermaid-cli
          npm install -g md-to-pdf

      - name: Convert Markdown to PDF
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
        run: |
          md-to-pdf Security.md --as-html

      - name: List generated files
        run: ls -lh Security.pdf || echo "PDF not found"

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Security-PDF
          path: Security.pdf
          retention-days: 30

      - name: Commit and push PDF
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Security.pdf
          git commit -m "docs: auto-generate Security.pdf with Mermaid diagrams [skip ci]" || echo "No changes to commit"
          git push

      - name: Create PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **PDF 生成成功（含完整拓扑图）！**\n\n📄 Artifacts 中可下载 `Security-PDF`\n\n🔗 [查看运行详情](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            })
